groups:
  - name: api-monitoring
    rules:
      - alert: ApiTargetDown
        expr: up{job="api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: API Prometheus target is down
          description: Prometheus has been unable to scrape the api target for at least 1 minute.

      - alert: ApiHighErrorResponses
        expr: sum(increase(api_response_status_total{status_code=~"5.."}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: API is returning 5xx responses
          description: The API has returned one or more 5xx responses over the last 5 minutes.

      - alert: ApiHighP95Latency
        expr: histogram_quantile(0.95, sum by (le) (rate(api_request_duration_seconds_bucket[5m]))) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency is high
          description: The 95th percentile API request latency has been above 1 second for at least 10 minutes.

      - alert: ModelInferenceErrorsDetected
        expr: sum(increase(model_inference_errors_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Model inference errors detected
          description: One or more model inference errors were recorded over the last 5 minutes.
