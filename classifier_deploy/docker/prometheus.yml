global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: "api"
    metrics_path: /metrics
    http_headers:
      X-API-Key:
        files:
          - /etc/prometheus/secrets/api_key
    static_configs:
      - targets:
          - api:8000
