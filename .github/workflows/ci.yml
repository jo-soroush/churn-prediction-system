name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  assignment-2-tests:
    name: Assignment 2 Automated Test Baseline
    runs-on: windows-latest
    env:
      API_AUTH_ENABLED: "true"
      API_KEY: assignment2-ci-api-key

    defaults:
      run:
        working-directory: classifier_deploy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: classifier_deploy/requirements-lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -r requirements-api.txt -r requirements-frontend.txt

      - name: Audit Python dependencies (non-blocking)
        run: |
          python -m pip install pip-audit
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::pip-audit could not be installed. This visibility step is non-blocking."
            exit 0
          }

          python -m pip_audit -r requirements-lock.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::pip-audit reported findings or could not complete. This visibility step is non-blocking."
            exit 0
          }

      - name: Run backend test suite
        run: python -m pytest

      - name: Validate frontend syntax
        run: python -m py_compile frontend/app.py

  assignment-2-container-validation:
    name: Assignment 2 Container Validation
    runs-on: ubuntu-latest
    env:
      CI_API_KEY: assignment2-ci-api-key

    defaults:
      run:
        working-directory: classifier_deploy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Docker version
        run: docker version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/assignment2-api
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Generate frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/assignment2-frontend
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./classifier_deploy
          file: ./classifier_deploy/docker/Dockerfile.api
          load: true
          push: false
          tags: |
            assignment2-api:ci
            ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./classifier_deploy
          file: ./classifier_deploy/docker/Dockerfile.frontend
          load: true
          push: false
          tags: |
            assignment2-frontend:ci
            ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - name: Start API release candidate
        run: |
          set -euo pipefail
          docker rm --force assignment2-api-candidate 2>/dev/null || true

          docker run --detach \
            --name assignment2-api-candidate \
            --security-opt no-new-privileges:true \
            --cap-drop ALL \
            --publish 127.0.0.1:8000:8000 \
            --env API_HOST=0.0.0.0 \
            --env API_PORT=8000 \
            --env API_WORKERS=1 \
            --env LOG_LEVEL=info \
            --env API_AUTH_ENABLED=true \
            --env API_KEY="$CI_API_KEY" \
            --env METRICS_ENABLED=true \
            --env METRICS_MULTIPROCESS_ENABLED=true \
            --env PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus-multiproc \
            --tmpfs /tmp/prometheus-multiproc:mode=1777 \
            assignment2-api:ci

      - name: Wait for API readiness
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if curl --silent --fail http://127.0.0.1:8000/health > /tmp/assignment2-health.json; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "API did not become ready within the smoke-check window."
              exit 1
            fi

            sleep 2
          done

      - name: Verify API release candidate
        run: |
          set -euo pipefail

          curl --fail-with-body http://127.0.0.1:8000/health
          curl --fail-with-body \
            --header "Content-Type: application/json" \
            --header "X-API-Key: $CI_API_KEY" \
            --data @artifacts/sample_input.json \
            http://127.0.0.1:8000/predict/tree
          curl --fail-with-body \
            --header "Content-Type: application/json" \
            --header "X-API-Key: $CI_API_KEY" \
            --data @artifacts/sample_input.json \
            http://127.0.0.1:8000/predict/mlp

      - name: Validate API metrics output
        run: |
          set -euo pipefail

          curl --fail-with-body \
            --header "X-API-Key: $CI_API_KEY" \
            http://127.0.0.1:8000/metrics \
            --output /tmp/assignment2-metrics.txt
          grep '^api_requests_total' /tmp/assignment2-metrics.txt
          grep 'endpoint="/health"' /tmp/assignment2-metrics.txt
          grep 'endpoint="/predict/tree"' /tmp/assignment2-metrics.txt
          grep 'endpoint="/predict/mlp"' /tmp/assignment2-metrics.txt
          grep '^api_request_duration_seconds_count' /tmp/assignment2-metrics.txt
          grep '^api_response_status_total' /tmp/assignment2-metrics.txt
          grep '^model_inference_requests_total' /tmp/assignment2-metrics.txt
          grep 'model="tree"' /tmp/assignment2-metrics.txt
          grep 'model="mlp"' /tmp/assignment2-metrics.txt
          grep '^model_inference_duration_seconds_count' /tmp/assignment2-metrics.txt

      - name: Push API image to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./classifier_deploy
          file: ./classifier_deploy/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Push frontend image to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./classifier_deploy
          file: ./classifier_deploy/docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - name: Show API release candidate logs
        if: always()
        run: docker logs --tail 120 assignment2-api-candidate || true

      - name: Stop API release candidate
        if: always()
        run: docker rm --force assignment2-api-candidate || true
